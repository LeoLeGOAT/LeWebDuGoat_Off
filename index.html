<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>GameHub</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🎮 GameHub</h1>

<input id="searchBar" placeholder="🔎 Rechercher un jeu..." onkeyup="searchGame()">

<button class="adminBtn" onclick="openAdmin()">Admin</button>

</header>


<div id="categories">

<button onclick="filterCategory('all')">Tous</button>
<button onclick="filterCategory('Course')">🏎️ Course</button>
<button onclick="filterCategory('Arcade')">🕹️ Arcade</button>
<button onclick="filterCategory('Puzzle')">🧩 Puzzle</button>
<button onclick="filterCategory('E-sports')">🏆 E-sports</button>
<button onclick="filterCategory('Jeux.io')">🌐 Jeux.io</button>
<button onclick="filterCategory('Jeux Roblox')">🧱 Roblox</button>
<button onclick="filterCategory('Multijoueurs')">👥 Multijoueurs</button>
<button onclick="filterCategory('Tendances')">🔥 Tendances</button>

</div>


<section id="games"></section>


<div id="gameViewer" class="hidden">

<div class="viewerTop">

<button onclick="fullscreenGame()">⛶ Plein écran</button>

<button onclick="closeGame()">✖</button>

</div>

<iframe id="gameFrame"></iframe>

</div>


<div id="adminPanel" class="hidden">

<div class="adminHeader">

<h2>⚙ Admin Panel</h2>

<button onclick="closeAdmin()">✖</button>

</div>

<input id="title" placeholder="Titre du jeu">

<input type="file" id="imageUpload">

<input id="url" placeholder="URL du jeu">

<select id="category">

<option value="Course">🏎️ Course</option>
<option value="Arcade">🕹️ Arcade</option>
<option value="Puzzle">🧩 Puzzle</option>
<option value="E-sports">🏆 E-sports</option>
<option value="Jeux.io">🌐 Jeux.io</option>
<option value="Jeux Roblox">🧱 Roblox</option>
<option value="Multijoueurs">👥 Multijoueurs</option>
<option value="Tendances">🔥 Tendances</option>

</select>

<textarea id="description" placeholder="Description"></textarea>

<button class="addGameBtn" onclick="addGame()">➕ Ajouter le jeu</button>

</div>


<script src="script.js"></script>

</body>
</html>
